name: Fuzz

on:
  workflow_dispatch:
    inputs:
      duration:
        description: 'Fuzz duration in seconds'
        default: '300'
        type: string

jobs:
  fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz
      - name: Run fuzzer
        run: |
          cd fuzz
          cargo +nightly fuzz run fuzz_parser -- -max_total_time=${{ inputs.duration }}
      - name: Upload corpus
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: fuzz-corpus
          path: fuzz/corpus/
