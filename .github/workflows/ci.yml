name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build
        run: cargo build --workspace

      - name: Test
        run: cargo test --workspace

      - name: Build release
        run: cargo build --release

      - name: GCC example verification
        run: |
          for f in examples/net/udp.wspec examples/net/tcp.wspec examples/net/ethernet.wspec \
                   examples/quic/varint.wspec examples/test/bits_groups.wspec \
                   examples/ble/att.wspec examples/mqtt/mqtt.wspec \
                   examples/ip/ipv4.wspec examples/tls/tls13.wspec; do
            name=$(echo $f | tr '/' '_' | sed 's/.wspec//')
            outdir="/tmp/ci-gcc/$name"
            mkdir -p "$outdir"
            ./target/release/wirespec compile "$f" -o "$outdir" -t c -I examples --recursive 2>/dev/null
            cfile=$(ls "$outdir"/*.c 2>/dev/null | head -1)
            if [ -n "$cfile" ]; then
              gcc -Wall -Wextra -Werror -std=c11 -fsyntax-only \
                -I "$outdir" -I runtime "$cfile"
              echo "✅ $f"
            fi
          done
